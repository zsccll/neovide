name: Build Neovide for RHEL 8

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Optional upstream neovide/neovide tag to build, for example v0.16.2. Leave empty to build this repository ref."
        required: false
        type: string
        default: ""
      create_release:
        description: "Create a GitHub Release in this repository after a successful build. Requires upstream_tag."
        required: true
        type: boolean
        default: false

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-rhel8:
    name: Build in Rocky Linux 8 container
    runs-on: ubuntu-latest

    container:
      image: rockylinux:8

    steps:
      - name: Prepare Rocky Linux 8 repositories
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled powertools || \
            dnf config-manager --set-enabled PowerTools || true
          dnf -y update

      - name: Install build dependencies
        run: |
          dnf -y groupinstall "Development Tools"

          dnf -y install \
            git \
            curl \
            ca-certificates \
            tar \
            gzip \
            xz \
            which \
            file \
            findutils \
            cmake \
            clang \
            ninja-build \
            pkgconf-pkg-config \
            python3 \
            openssl-devel \
            fontconfig-devel \
            freetype-devel \
            expat-devel \
            bzip2-devel \
            libxcb-devel \
            libxkbcommon-devel \
            libxkbcommon-x11-devel \
            libX11-devel \
            libXcursor-devel \
            libXi-devel \
            libXrandr-devel \
            libXrender-devel \
            libXext-devel \
            libXfixes-devel \
            libXinerama-devel \
            mesa-libGL-devel \
            mesa-libEGL-devel \
            vulkan-loader \
            vulkan-loader-devel \
            wayland-devel

          dnf -y install \
            gcc-toolset-15-gcc \
            gcc-toolset-15-gcc-c++ \
            gcc-toolset-15-libstdc++-devel || \
          dnf -y install \
            gcc-toolset-13-gcc \
            gcc-toolset-13-gcc-c++ \
            gcc-toolset-13-libstdc++-devel || \
          dnf -y install \
            gcc-toolset-12-gcc \
            gcc-toolset-12-gcc-c++ \
            gcc-toolset-12-libstdc++-devel || \
          dnf -y install \
            gcc-toolset-11-gcc \
            gcc-toolset-11-gcc-c++ \
            gcc-toolset-11-libstdc++-devel

      - name: Checkout current repository
        if: ${{ inputs.upstream_tag == '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve upstream tag
        id: upstream
        if: ${{ inputs.upstream_tag != '' }}
        env:
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
        run: |
          set -euo pipefail

          input="$UPSTREAM_TAG"
          without_v="${input#v}"
          candidates=("$input")
          if [ "$without_v" != "$input" ]; then
            candidates+=("$without_v")
          else
            candidates+=("v$input")
          fi

          checkout_ref=""
          for candidate in "${candidates[@]}"; do
            if git ls-remote --exit-code --tags --refs \
              https://github.com/neovide/neovide.git "refs/tags/$candidate" >/dev/null; then
              checkout_ref="$candidate"
              break
            fi
          done

          if [ -z "$checkout_ref" ]; then
            echo "Could not find upstream tag '$input'. Tried: ${candidates[*]}"
            exit 1
          fi

          release_version="$without_v"
          release_tag="v${release_version}-rhel8"

          {
            echo "checkout_ref=$checkout_ref"
            echo "release_version=$release_version"
            echo "release_tag=$release_tag"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved upstream tag '$input' to checkout ref '$checkout_ref'"
          echo "RHEL8 release tag will be '$release_tag'"

      - name: Checkout upstream tag
        if: ${{ inputs.upstream_tag != '' }}
        uses: actions/checkout@v4
        with:
          repository: neovide/neovide
          ref: ${{ steps.upstream.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Validate release inputs
        if: ${{ inputs.create_release }}
        env:
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
        run: |
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "create_release requires upstream_tag, for example v0.16.2"
            exit 1
          fi

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Use RHEL 8 compatible Skia build configuration
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          cargo_toml = Path("Cargo.toml")
          text = cargo_toml.read_text()

          section = '[target.\'cfg(not(any(target_os = "windows", target_os = "macos")))\'.dependencies]'
          section_start = text.find(section)
          if section_start == -1:
              raise SystemExit("Could not find the Linux target dependency section")

          next_section = text.find("\n[", section_start + len(section))
          section_end = len(text) if next_section == -1 else next_section
          before = text[:section_start]
          linux_section = text[section_start:section_end]
          after = text[section_end:]

          match = re.search(
              r'(skia-safe\s*=\s*\{\s*version\s*=\s*"[^"]+"\s*,\s*features\s*=\s*\[)([^\]]*)(\]\s*\})',
              linux_section,
          )
          if not match:
              raise SystemExit("Could not find the Linux skia-safe dependency line to patch")

          features = [
              feature.strip().strip('"')
              for feature in match.group(2).split(",")
              if feature.strip()
          ]
          if "embed-freetype" not in features:
              features.append("embed-freetype")

          feature_text = ", ".join(f'"{feature}"' for feature in features)
          linux_section = (
              linux_section[:match.start()]
              + match.group(1)
              + feature_text
              + match.group(3)
              + linux_section[match.end():]
          )

          cargo_toml.write_text(before + linux_section + after)
          PY

          grep -n 'skia-safe' Cargo.toml

      - name: Build Neovide
        run: |
          . "$HOME/.cargo/env"
          source /opt/rh/gcc-toolset-15/enable || \
            source /opt/rh/gcc-toolset-13/enable || \
            source /opt/rh/gcc-toolset-12/enable || \
            source /opt/rh/gcc-toolset-11/enable

          mkdir -p "$PWD/.ci-bin"
          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          template = dedent("""\
              #!/usr/bin/env bash
              args=()
              for arg in "$@"; do
                case "$arg" in
                  --target=x86_64-linux-gnu) ;;
                  *) args+=("$arg") ;;
                esac
              done
              exec {real_compiler} "${args[@]}"
          """)

          Path(".ci-bin/clang").write_text(
              template.replace("{real_compiler}", "/usr/bin/clang")
          )
          Path(".ci-bin/clang++").write_text(
              template.replace("{real_compiler}", "/usr/bin/clang++")
          )
          PY
          chmod +x "$PWD/.ci-bin/clang" "$PWD/.ci-bin/clang++"
          export PATH="$PWD/.ci-bin:$PATH"

          export RUSTFLAGS="-C link-arg=-static-libstdc++ -C link-arg=-static-libgcc"
          gcc --version
          g++ --version
          command -v clang++
          clang++ --version
          printf '#include <bit>\nint main(){return std::has_single_bit(8u) ? 0 : 1;}\n' | \
            clang++ --target=x86_64-linux-gnu -std=c++20 -x c++ - -o /tmp/probe-clang-target
          cargo build --release

      - name: Generate compatibility reports
        run: |
          . "$HOME/.cargo/env"
          source /opt/rh/gcc-toolset-15/enable || \
            source /opt/rh/gcc-toolset-13/enable || \
            source /opt/rh/gcc-toolset-12/enable || \
            source /opt/rh/gcc-toolset-11/enable
          mkdir -p reports

          cp /etc/os-release reports/os-release.txt

          {
            echo "## Rust"
            rustc --version --verbose
            echo
            cargo --version --verbose
            echo
            echo "## C toolchain"
            gcc --version
            echo
            g++ --version
            echo
            clang --version
            echo
            ninja --version
            echo
            echo "## glibc"
            ldd --version
          } | tee reports/toolchain.txt

          file target/release/neovide | tee reports/file.txt
          ldd target/release/neovide | tee reports/ldd.txt

          strings target/release/neovide | \
            grep -o 'GLIBC_[0-9.]*' | sort -Vu > reports/glibc-symbols.txt || true
          strings target/release/neovide | \
            grep -o 'GLIBCXX_[0-9.]*' | sort -Vu > reports/glibcxx-symbols.txt || true

          {
            echo "# Neovide RHEL 8 Compatibility Report"
            echo
            echo "## Build OS"
            cat reports/os-release.txt
            echo
            echo "## Toolchain"
            cat reports/toolchain.txt
            echo
            echo "## Binary"
            cat reports/file.txt
            echo
            echo "## Required GLIBC symbols"
            cat reports/glibc-symbols.txt
            echo
            echo "## Required GLIBCXX symbols"
            cat reports/glibcxx-symbols.txt
            echo
            echo "## Dynamic dependencies"
            cat reports/ldd.txt
          } > reports/rhel8-compat-report.txt

      - name: Package artifact
        run: |
          mkdir -p dist/neovide-rhel8-x86_64

          cp target/release/neovide dist/neovide-rhel8-x86_64/neovide
          cp reports/rhel8-compat-report.txt dist/neovide-rhel8-x86_64/
          chmod +x dist/neovide-rhel8-x86_64/neovide

          cat > dist/neovide-rhel8-x86_64/README.txt <<'EOF'
          Neovide RHEL 8 x86_64 build
          ============================

          This binary was built in a Rocky Linux 8 container to keep the glibc
          baseline close to RHEL 8.10 / glibc 2.28.

          Install:
            tar -xzf neovide-rhel8-x86_64.tar.gz
            install -m 0755 neovide-rhel8-x86_64/neovide ~/.local/bin/neovide

          Runtime notes:
            - Neovim must be installed separately and available as nvim.
            - A Linux desktop session with X11 or Wayland and working OpenGL/Vulkan
              graphics drivers is required.
            - See rhel8-compat-report.txt for ldd, file, and glibc symbol checks.
          EOF

          tar -C dist -czf neovide-rhel8-x86_64.tar.gz neovide-rhel8-x86_64

      - name: Upload Neovide binary
        uses: actions/upload-artifact@v4
        with:
          name: neovide-rhel8-x86_64
          path: neovide-rhel8-x86_64.tar.gz
          if-no-files-found: error

      - name: Upload compatibility reports
        uses: actions/upload-artifact@v4
        with:
          name: neovide-rhel8-compat-reports
          path: reports/
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.checkout_ref }}
          RELEASE_TAG: ${{ steps.upstream.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.upstream.outputs.release_version }}
        run: |
          python3 - <<'PY'
          import json
          import mimetypes
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          upstream_tag = os.environ["UPSTREAM_TAG"]
          release_tag = os.environ["RELEASE_TAG"]
          release_version = os.environ["RELEASE_VERSION"]
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/"
              f"{repository}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )

          api_base = f"https://api.github.com/repos/{repository}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request_json(method, url, payload=None, extra_headers=None):
              data = None
              request_headers = dict(headers)
              if extra_headers:
                  request_headers.update(extra_headers)
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  request_headers["Content-Type"] = "application/json"
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers=request_headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      body = response.read()
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  print(body, file=sys.stderr)
                  raise
              return json.loads(body.decode("utf-8")) if body else {}

          try:
              request_json("GET", f"{api_base}/releases/tags/{release_tag}")
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
          else:
              raise SystemExit(f"Release {release_tag} already exists")

          body = "\n".join(
              [
                  f"RHEL 8 x86_64 build for upstream Neovide {upstream_tag}.",
                  "",
                  "Built in a Rocky Linux 8.10 container to keep the glibc",
                  "baseline close to RHEL 8.10 / glibc 2.28.",
                  "",
                  f"Workflow run: {run_url}",
                  "",
                  "Assets:",
                  "- neovide-rhel8-x86_64.tar.gz",
                  "- rhel8-compat-report.txt",
              ]
          )

          release = request_json(
              "POST",
              f"{api_base}/releases",
              {
                  "tag_name": release_tag,
                  "name": f"Neovide v{release_version} for RHEL 8 x86_64",
                  "body": body,
                  "draft": False,
                  "prerelease": False,
              },
          )

          upload_url = release["upload_url"].split("{", 1)[0]
          assets = [
              Path("neovide-rhel8-x86_64.tar.gz"),
              Path("reports/rhel8-compat-report.txt"),
          ]

          for asset in assets:
              content_type = mimetypes.guess_type(asset.name)[0] or "application/octet-stream"
              upload_endpoint = (
                  upload_url + "?" + urllib.parse.urlencode({"name": asset.name})
              )
              data = asset.read_bytes()
              req = urllib.request.Request(
                  upload_endpoint,
                  data=data,
                  headers={
                      **headers,
                      "Content-Type": content_type,
                      "Content-Length": str(len(data)),
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      uploaded = json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  print(body, file=sys.stderr)
                  raise
              print(f"Uploaded {uploaded['name']} to {release['html_url']}")

          print(f"Created release {release_tag}: {release['html_url']}")
          PY
