name: Build Neovide for RHEL 8

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Cargo build profile"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build-rhel8:
    name: Build in Rocky Linux 8 container
    runs-on: ubuntu-latest

    container:
      image: rockylinux:8

    steps:
      - name: Prepare Rocky Linux 8 repositories
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled powertools || true
          dnf -y update

      - name: Install build dependencies
        run: |
          dnf -y groupinstall "Development Tools"

          dnf -y install \
            git \
            curl \
            ca-certificates \
            tar \
            gzip \
            xz \
            which \
            file \
            findutils \
            cmake \
            clang \
            pkgconf \
            pkgconf-pkg-config \
            openssl-devel \
            fontconfig-devel \
            freetype-devel \
            expat-devel \
            libxcb-devel \
            libxkbcommon-devel \
            libX11-devel \
            libXcursor-devel \
            libXi-devel \
            libXrandr-devel \
            libXrender-devel \
            libXext-devel \
            mesa-libGL-devel \
            mesa-libEGL-devel \
            vulkan-loader \
            vulkan-loader-devel \
            wayland-devel

      - name: Check system ABI baseline
        run: |
          cat /etc/os-release
          ldd --version
          gcc --version
          g++ --version

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Build Neovide
        run: |
          . "$HOME/.cargo/env"

          if [ "${{ inputs.build_type }}" = "release" ]; then
            cargo build --release
          else
            cargo build
          fi

      - name: Select binary
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            echo "NEOVIDE_BIN=target/release/neovide" >> "$GITHUB_ENV"
          else
            echo "NEOVIDE_BIN=target/debug/neovide" >> "$GITHUB_ENV"
          fi

      - name: Inspect binary compatibility
        run: |
          mkdir -p dist reports

          file "$NEOVIDE_BIN" | tee reports/file.txt
          ldd "$NEOVIDE_BIN" | tee reports/ldd.txt

          {
            echo "## OS"
            cat /etc/os-release
            echo

            echo "## glibc"
            ldd --version | head -1
            echo

            echo "## binary"
            file "$NEOVIDE_BIN"
            echo

            echo "## required GLIBC symbols"
            strings "$NEOVIDE_BIN" | grep -o 'GLIBC_[0-9.]*' | sort -Vu || true
            echo

            echo "## required GLIBCXX symbols"
            strings "$NEOVIDE_BIN" | grep -o 'GLIBCXX_[0-9.]*' | sort -Vu || true
            echo

            echo "## ldd"
            ldd "$NEOVIDE_BIN"
          } | tee reports/rhel8-compat-report.txt

      - name: Package artifact
        run: |
          mkdir -p dist/neovide-rhel8-x86_64

          cp "$NEOVIDE_BIN" dist/neovide-rhel8-x86_64/neovide
          cp reports/rhel8-compat-report.txt dist/neovide-rhel8-x86_64/
          chmod +x dist/neovide-rhel8-x86_64/neovide

          tar -C dist -czf neovide-rhel8-x86_64.tar.gz neovide-rhel8-x86_64

      - name: Upload Neovide binary
        uses: actions/upload-artifact@v4
        with:
          name: neovide-rhel8-x86_64
          path: neovide-rhel8-x86_64.tar.gz
          if-no-files-found: error

      - name: Upload compatibility reports
        uses: actions/upload-artifact@v4
        with:
          name: neovide-rhel8-compat-reports
          path: reports/
          if-no-files-found: error