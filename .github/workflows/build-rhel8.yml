name: Build Neovide for RHEL 8

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-rhel8:
    name: Build in Rocky Linux 8 container
    runs-on: ubuntu-latest

    container:
      image: rockylinux:8

    steps:
      - name: Prepare Rocky Linux 8 repositories
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled powertools || \
            dnf config-manager --set-enabled PowerTools || true
          dnf -y update

      - name: Install build dependencies
        run: |
          dnf -y groupinstall "Development Tools"

          dnf -y install \
            git \
            curl \
            ca-certificates \
            tar \
            gzip \
            xz \
            which \
            file \
            findutils \
            cmake \
            clang \
            ninja-build \
            patch \
            perl \
            pkgconf-pkg-config \
            python3 \
            unzip \
            openssl-devel \
            fontconfig-devel \
            freetype-devel \
            expat-devel \
            bzip2-devel \
            libxcb-devel \
            libxkbcommon-devel \
            libxkbcommon-x11-devel \
            libX11-devel \
            libXcursor-devel \
            libXi-devel \
            libXrandr-devel \
            libXrender-devel \
            libXext-devel \
            libXfixes-devel \
            libXinerama-devel \
            mesa-libGL-devel \
            mesa-libEGL-devel \
            vulkan-loader \
            vulkan-loader-devel \
            wayland-devel \
            zip

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout rust-skia sources
        uses: actions/checkout@v4
        with:
          repository: rust-skia/rust-skia
          ref: 0.97.2
          path: rust-skia
          submodules: recursive

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Use RHEL 8 compatible Skia build configuration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          cargo_toml = Path("Cargo.toml")
          text = cargo_toml.read_text()
          old = 'skia-safe = { version = "0.97.2", features = ["gl", "textlayout"] }'
          new = (
              'skia-safe = { version = "0.97.2", default-features = false, '
              'features = ["gl", "textlayout", "embed-icudtl", "pdf", "jpeg", "embed-freetype"] }'
          )

          if old not in text:
              raise SystemExit("Could not find the Linux skia-safe dependency line to patch")

          cargo_toml.write_text(text.replace(old, new, 1))
          PY

          grep -n 'skia-safe' Cargo.toml

      - name: Build Neovide
        env:
          SKIA_SOURCE_DIR: ${{ github.workspace }}/rust-skia/skia-bindings
        run: |
          . "$HOME/.cargo/env"
          test -x "$SKIA_SOURCE_DIR/skia/tools/git-sync-deps"
          cargo build --release

      - name: Generate compatibility reports
        run: |
          . "$HOME/.cargo/env"
          mkdir -p reports

          cp /etc/os-release reports/os-release.txt

          {
            echo "## Rust"
            rustc --version --verbose
            echo
            cargo --version --verbose
            echo
            echo "## C toolchain"
            gcc --version
            echo
            g++ --version
            echo
            clang --version
            echo
            echo "## glibc"
            ldd --version
          } | tee reports/toolchain.txt

          file target/release/neovide | tee reports/file.txt
          ldd target/release/neovide | tee reports/ldd.txt

          strings target/release/neovide | \
            grep -o 'GLIBC_[0-9.]*' | sort -Vu > reports/glibc-symbols.txt || true
          strings target/release/neovide | \
            grep -o 'GLIBCXX_[0-9.]*' | sort -Vu > reports/glibcxx-symbols.txt || true

          {
            echo "# Neovide RHEL 8 Compatibility Report"
            echo
            echo "## Build OS"
            cat reports/os-release.txt
            echo
            echo "## Toolchain"
            cat reports/toolchain.txt
            echo
            echo "## Binary"
            cat reports/file.txt
            echo
            echo "## Required GLIBC symbols"
            cat reports/glibc-symbols.txt
            echo
            echo "## Required GLIBCXX symbols"
            cat reports/glibcxx-symbols.txt
            echo
            echo "## Dynamic dependencies"
            cat reports/ldd.txt
          } > reports/rhel8-compat-report.txt

      - name: Package artifact
        run: |
          mkdir -p dist/neovide-rhel8-x86_64

          cp target/release/neovide dist/neovide-rhel8-x86_64/neovide
          cp reports/rhel8-compat-report.txt dist/neovide-rhel8-x86_64/
          chmod +x dist/neovide-rhel8-x86_64/neovide

          cat > dist/neovide-rhel8-x86_64/README.txt <<'EOF'
          Neovide RHEL 8 x86_64 build
          ============================

          This binary was built in a Rocky Linux 8 container to keep the glibc
          baseline close to RHEL 8.10 / glibc 2.28.

          Install:
            tar -xzf neovide-rhel8-x86_64.tar.gz
            install -m 0755 neovide-rhel8-x86_64/neovide ~/.local/bin/neovide

          Runtime notes:
            - Neovim must be installed separately and available as nvim.
            - A Linux desktop session with X11 or Wayland and working OpenGL/Vulkan
              graphics drivers is required.
            - See rhel8-compat-report.txt for ldd, file, and glibc symbol checks.
          EOF

          tar -C dist -czf neovide-rhel8-x86_64.tar.gz neovide-rhel8-x86_64

      - name: Upload Neovide binary
        uses: actions/upload-artifact@v4
        with:
          name: neovide-rhel8-x86_64
          path: neovide-rhel8-x86_64.tar.gz
          if-no-files-found: error

      - name: Upload compatibility reports
        uses: actions/upload-artifact@v4
        with:
          name: neovide-rhel8-compat-reports
          path: reports/
          if-no-files-found: error
